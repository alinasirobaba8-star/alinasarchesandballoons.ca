    .book-btn,
    .contact-button {
      display: inline-block;
      background: #c06c84;
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 999px;
      font-weight: 600;
      transition: 0.3s;
      border: none;
      cursor: pointer;
      margin: 8px 8px 0 0;
    }

    .book-btn:hover,
    .contact-button:hover {
      background: #a95770;
    }

    .balloon {
      position: absolute;
      bottom: -140px;
      width: 70px;
      height: 90px;
      border-radius: 50% 50% 45% 45%;
      opacity: 0.35;
      animation: floatUp 14s linear infinite;
    }

    .balloon::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 88px;
      width: 2px;
      height: 90px;
      background: rgba(120,120,120,0.35);
      transform: translateX(-50%);
    }

    .balloon1 {
      left: 8%;
      background: #f7b2d0;
      animation-delay: 0s;
    }

    .balloon2 {
      left: 24%;
      background: #d8c2ff;
      animation-delay: 3s;
    }

    .balloon3 {
      left: 50%;
      background: #ffd6a5;
      animation-delay: 6s;
    }

    .balloon4 {
      left: 72%;
      background: #bde0fe;
      animation-delay: 2s;
    }

    .balloon5 {
      left: 88%;
      background: #caffbf;
      animation-delay: 8s;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.35;
      }
      50% {
        transform: translateY(-50vh) rotate(4deg);
        opacity: 0.4;
      }
      100% {
        transform: translateY(-110vh) rotate(-4deg);
        opacity: 0;
      }
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.45);
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: #fff;
      width: 100%;
      max-width: 900px;

    }
